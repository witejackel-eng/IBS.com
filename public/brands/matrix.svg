<svg viewBox="0 0 280 80" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Matrix ComSec</title>
  <!-- Teal square with stylised M icon -->
  <rect x="4" y="4" width="56" height="56" rx="4" fill="#00A5AE"/>
  <!-- M shape built from geometric rectangles -->
  <rect x="14" y="14" width="8" height="36" rx="2" fill="#ffffff"/>
  <rect x="28" y="14" width="8" height="36" rx="2" fill="#ffffff"/>
  <rect x="42" y="14" width="8" height="36" rx="2" fill="#ffffff"/>
  <rect x="22" y="24" width="20" height="8" rx="2" fill="#ffffff"/>
  <!-- Subtle dot pattern (top-left of icon) -->
  <circle cx="16" cy="16" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="22" cy="16" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="16" cy="22" r="1.5" fill="#ffffff" opacity="0.5"/>
  <!-- MATRIX wordmark -->
  <text x="72" y="38"
    font-family="Arial,Helvetica,sans-serif"
    font-weight="800" letter-spacing="0.04em" font-size="30"
    fill="#00A5AE">MATRIX</text>
  <!-- COMSEC subtitle -->
  <text x="73" y="54"
    font-family="Arial,Helvetica,sans-serif"
    font-weight="600" letter-spacing="0.18em" font-size="10"
    fill="#555555">COMSEC</text>
</svg>